<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>職務経歴書 — 中村 匠</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @page {
        size: A4;
        margin: 16mm 14mm;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        font-size: 10pt;
        line-height: 1.75;
        color: #111;
        background: #fff;
        padding: 18mm 16mm;
      }

      @media print {
        body { padding: 0; }
      }

      /* ---- Document header ---- */
      .doc-date {
        text-align: right;
        font-size: 9pt;
        color: #555;
        margin-bottom: 6px;
      }

      /* ---- h1: Document title ---- */
      h1 {
        text-align: center;
        font-size: 17pt;
        font-weight: 700;
        letter-spacing: 0.2em;
        border-bottom: 2px solid #111;
        padding-bottom: 8px;
        margin-bottom: 14px;
      }

      /* ---- Personal info ---- */
      .personal-info {
        display: grid;
        grid-template-columns: 72px 1fr;
        gap: 3px 10px;
        margin-bottom: 18px;
        font-size: 9.5pt;
        color: #333;
      }

      .personal-info .key {
        font-weight: 700;
        color: #555;
        white-space: nowrap;
      }

      /* ---- h2: Section headers ---- */
      h2 {
        font-size: 10.5pt;
        font-weight: 700;
        background: #1c3a5a;
        color: #fff;
        padding: 4px 10px;
        margin: 18px 0 10px;
        letter-spacing: 0.06em;
      }

      /* ---- h3: Company name ---- */
      h3 {
        font-size: 10.5pt;
        font-weight: 700;
        border-left: 3px solid #1c6e8c;
        padding-left: 8px;
        margin: 14px 0 5px;
      }

      /* ---- h4: Assignment sub-header (出向先 / 本社案件) ---- */
      h4 {
        font-size: 10pt;
        font-weight: 700;
        background: #e8f0f7;
        border-left: 3px solid #1c6e8c;
        padding: 4px 10px;
        margin: 14px 0 6px;
        color: #1c3a5a;
      }

      /* ---- Company / assignment meta paragraph ---- */
      h3 + p,
      h4 + p {
        font-size: 9pt;
        color: #444;
        margin-bottom: 10px;
      }

      /* ---- General paragraphs ---- */
      p {
        margin-bottom: 5px;
      }

      /* ---- Lists ---- */
      ul, ol {
        padding-left: 1.3em;
        margin: 3px 0 6px;
      }

      li {
        margin-bottom: 2px;
        font-size: 9.5pt;
      }

      /* ---- Project card ---- */
      .project {
        border: 1px solid #d4d4d4;
        border-radius: 4px;
        padding: 9px 12px;
        margin-bottom: 10px;
        break-inside: avoid;
      }

      /* ---- h5: Project title (inside .project) ---- */
      .project h5 {
        font-size: 10pt;
        font-weight: 700;
        color: #1c3a5a;
        margin-bottom: 4px;
      }

      /* ---- Project meta: first <p> after h5 ---- */
      .project h5 + p {
        font-size: 8.5pt;
        color: #666;
        margin-bottom: 6px;
      }

      /* ---- Tech tags: inline code inside .project ---- */
      .project code {
        display: inline-block;
        background: #eef3f7;
        border: 1px solid #b0c8d8;
        border-radius: 3px;
        padding: 1px 6px;
        font-size: 8.5pt;
        color: #1c3a5a;
        font-family: inherit;
        margin: 2px 2px 2px 0;
      }

      /* ---- Skills table ---- */
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 9.5pt;
        margin-bottom: 8px;
      }

      th {
        background: #f0f0f0;
        border: 1px solid #ccc;
        padding: 5px 8px;
        font-weight: 700;
        text-align: left;
      }

      td {
        border: 1px solid #ccc;
        padding: 5px 8px;
        vertical-align: top;
      }

      tr:nth-child(even) td {
        background: #fafafa;
      }

      /* ---- Page break ---- */
      .page-break {
        break-before: page;
      }

      @media screen {
        .page-break {
          border-top: 2px dashed #aaa;
          margin-top: 28px;
          padding-top: 18px;
        }
      }
    </style>
  </head>
  <body>
    {{content}}
  </body>
</html>
